# One-off backfill of 1-second bars into Postgres (bars_1s). Disposable:
#   kubectl -n nomad delete job backfill-bars --ignore-not-found
# Script is mounted from the `backfill-script` ConfigMap (created from
# scripts/backfill_bars.py). Reads massive key + DB url from secrets.
apiVersion: batch/v1
kind: Job
metadata:
  name: backfill-bars
  namespace: nomad
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: backfill
          image: python:3.12-slim
          command: ["bash", "-lc"]
          args:
            - |
              set -e
              pip install -q httpx asyncpg
              python /app/backfill_bars.py
          env:
            - name: SYMBOLS
              value: "NVDA,TSLA,TQQQ,SPY"
            - name: DAYS
              value: "365"
            - name: MASSIVE_BASE_URL
              value: "https://api.massive.com"
            - name: MASSIVE_API_KEY
              valueFrom: { secretKeyRef: { name: massive-api, key: MASSIVE_API_KEY } }
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: nomad-db, key: DATABASE_URL } }
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: backfill-script
